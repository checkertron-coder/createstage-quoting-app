<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - CreateQuote</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-VjwCVtkPv-QDbbuUH5zCQ.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
</head>
<body>
    <div class="auth-card" style="margin-top: 80px;">
        <h1 class="auth-title">CreateQuote</h1>
        <p class="auth-subtitle">Set a New Password</p>

        <div id="reset-form">
            <div id="reset-error" class="auth-error" style="display:none"></div>
            <div id="reset-success" class="auth-success" style="display:none"></div>

            <div class="auth-fields">
                <input type="password" id="reset-password" placeholder="New password (min 8 characters)" autocomplete="new-password">
                <input type="password" id="reset-confirm" placeholder="Confirm new password" autocomplete="new-password">
            </div>
            <div class="auth-buttons">
                <button class="btn btn-primary btn-full" id="reset-btn" onclick="handleReset()">Reset Password</button>
            </div>
            <p class="auth-hint"><a href="/app">Back to login</a></p>
        </div>
    </div>

    <script>
        function getToken() {
            var params = new URLSearchParams(window.location.search);
            return params.get('token');
        }

        // Check for token on load
        (function() {
            if (!getToken()) {
                document.getElementById('reset-error').textContent = 'Invalid reset link. Please request a new one.';
                document.getElementById('reset-error').style.display = 'block';
                document.getElementById('reset-btn').disabled = true;
            }
        })();

        async function handleReset() {
            var password = document.getElementById('reset-password').value;
            var confirm = document.getElementById('reset-confirm').value;
            var errorEl = document.getElementById('reset-error');
            var successEl = document.getElementById('reset-success');
            var btn = document.getElementById('reset-btn');
            var token = getToken();

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!password || password.length < 8) {
                errorEl.textContent = 'Password must be at least 8 characters.';
                errorEl.style.display = 'block';
                return;
            }

            if (password !== confirm) {
                errorEl.textContent = 'Passwords do not match.';
                errorEl.style.display = 'block';
                return;
            }

            if (!token) {
                errorEl.textContent = 'Invalid reset link. Please request a new one.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Resetting...';

            try {
                var resp = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: password }),
                });
                var data = await resp.json();

                if (!resp.ok) {
                    errorEl.textContent = data.detail || 'This reset link has expired or already been used.';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'Reset Password';
                    return;
                }

                // Store tokens and redirect to app
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);

                successEl.textContent = 'Password reset successfully! Redirecting...';
                successEl.style.display = 'block';

                setTimeout(function() { window.location.href = '/app'; }, 1500);
            } catch (e) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        }

        // Allow Enter key to submit
        document.getElementById('reset-confirm').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleReset();
        });
    </script>
</body>
</html>
