<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CreateQuote</title>
    <link rel="icon" type="image/png" href="/images/CQ%20CreateQuote.png">
    <link rel="apple-touch-icon" href="/images/CQ%20CreateQuote.png">
    <link rel="stylesheet" href="/css/style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-VjwCVtkPv-QDbbuUH5zCQ.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
</head>
<body>

    <!-- Navigation -->
    <nav class="app-nav" id="main-nav" style="display:none">
        <div class="nav-left">
            <a href="/" class="nav-brand" style="text-decoration:none;color:inherit">CreateQuote</a>
            <span class="nav-shop-name" id="nav-shop-name"></span>
        </div>
        <div class="nav-right">
            <button class="nav-btn active" data-view="quote" onclick="QuoteFlow.newQuote(); App.showView('quote')">New Quote</button>
            <button class="nav-btn" data-view="history" onclick="App.showView('history')">Quotes</button>
            <button class="nav-btn" data-view="bid" onclick="App.showView('bid')">Upload Bid</button>
            <button class="nav-btn" data-view="profile" onclick="Auth.renderProfileView(); App.showView('profile')">Profile</button>
            <button class="nav-btn-logout" onclick="Auth.logout()">Log Out</button>
        </div>
    </nav>

    <!-- Views -->
    <main>
        <div id="view-auth" style="display:none"></div>
        <div id="view-profile" style="display:none"></div>
        <div id="view-onboarding" style="display:none"></div>
        <div id="view-quote" style="display:none"></div>
        <div id="view-history" style="display:none"></div>
        <div id="view-bid" style="display:none">
            <div class="describe-card">
                <h2>Upload Bid Document</h2>
                <div class="bid-upload-area" id="bid-drop-zone">
                    <p>Drop PDF here or click to select</p>
                    <input type="file" id="bid-file-input" accept=".pdf" hidden>
                </div>
                <div id="bid-results" style="display:none"></div>
            </div>
        </div>
    </main>

    <!-- Scripts (order matters: api first, then auth, then quote-flow, then app) -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/quote-flow.js"></script>
    <script src="/js/bid-upload.js"></script>
    <script src="/js/shop-onboarding.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
