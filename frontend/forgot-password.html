<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - CreateQuote</title>
    <link rel="stylesheet" href="/css/style.css">
    <!-- Privacy-friendly analytics by Plausible -->
    <script async src="https://plausible.io/js/pa-VjwCVtkPv-QDbbuUH5zCQ.js"></script>
    <script>
      window.plausible=window.plausible||function(){(plausible.q=plausible.q||[]).push(arguments)},plausible.init=plausible.init||function(i){plausible.o=i||{}};
      plausible.init()
    </script>
</head>
<body>
    <div class="auth-card" style="margin-top: 80px;">
        <h1 class="auth-title">CreateQuote</h1>
        <p class="auth-subtitle">Reset Your Password</p>

        <div id="forgot-form">
            <div id="forgot-error" class="auth-error" style="display:none"></div>
            <div id="forgot-success" class="auth-success" style="display:none"></div>

            <div class="auth-fields">
                <input type="email" id="forgot-email" placeholder="Enter your email address" autocomplete="email">
            </div>
            <div class="auth-buttons">
                <button class="btn btn-primary btn-full" id="forgot-btn" onclick="handleForgot()">Send Reset Link</button>
            </div>
            <p class="auth-hint"><a href="/app">Back to login</a></p>
        </div>
    </div>

    <script>
        async function handleForgot() {
            var email = document.getElementById('forgot-email').value.trim();
            var errorEl = document.getElementById('forgot-error');
            var successEl = document.getElementById('forgot-success');
            var btn = document.getElementById('forgot-btn');

            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            if (!email) {
                errorEl.textContent = 'Please enter your email address.';
                errorEl.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Sending...';

            try {
                var resp = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email }),
                });
                var data = await resp.json();

                successEl.textContent = data.message || 'If that email is registered, a reset link has been sent.';
                successEl.style.display = 'block';
            } catch (e) {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Send Reset Link';
            }
        }

        // Allow Enter key to submit
        document.getElementById('forgot-email').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleForgot();
        });
    </script>
</body>
</html>
